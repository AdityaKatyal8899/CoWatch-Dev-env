version: "3.9"

services:
  backend:
    image: cowatch-backend:latest
    container_name: cowatch_backend
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    image: cowatch-backend:latest
    container_name: cowatch_celery_worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: cowatch_redis
    ports:
      - "6379:6379"
    restart: unless-stopped