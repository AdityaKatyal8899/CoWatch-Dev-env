services:
  backend:
    image: cowatch-backend:latest
    container_name: cowatch_backend
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=host.docker.internal
    depends_on:
      - redis
    volumes:
      - hls_data:/app/storage
      - hls_output:/app/outputs
    restart: unless-stopped

  celery_worker:
    image: cowatch-backend:latest
    container_name: cowatch_celery_worker
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=host.docker.internal
    depends_on:
      - redis
    volumes:
      - hls_data:/app/storage
      - hls_output:/app/outputs
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: cowatch_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  hls_data:
  hls_output: